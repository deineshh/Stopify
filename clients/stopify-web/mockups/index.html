<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://kit.fontawesome.com/fd823335d3.js" crossorigin="anonymous"></script>

  <title>Stopify - Web Player: Music for everyone</title>

  <link rel="icon" type="image/png" href="assets/images/icons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="assets/images/icons/favicon.svg" />
  <link rel="shortcut icon" href="assets/images/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/icons/apple-touch-icon.png" />
  <link rel="manifest" href="assets/images/icons/site.webmanifest" />

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/home.css" />
</head>
<body>
  <!-- GLOBAL HEADER -->
  <header id="global-header" class="layout-section">
    GLOBAL HEADER
  </header>

  <!-- FULL SCREEN VIEW -->
  <div id="full-screen-view__group" class="layout-section">FULL SCREEN VIEW</div>

  <!-- MAIN SECTION -->
  <main class="layout-section">
    <!-- LEFT SIDEBAR -->
    <section id="left-sidebar__group" class="main-section">
      LEFT SIDEBAR
      <nav id="left-sidebar__main" class="sidebar-main"></nav>
      <div class="layout-resizer"></div>
    </section>

    <!-- MAIN VIEW -->
    <section id="main-view" class="main-section">MAIN VIEW</section>

    <!-- RIGHT SIDEBAR -->
    <section id="right-sidebar__group" class="main-section">
      <div class="layout-resizer"></div>
      <aside id="right-sidebar__main" class="sidebar-main"></aside>
      RIGHT SIDEBAR
    </section>
  </main>

  <!-- NOW PLAYING BAR -->
  <aside id="now-playing-bar" class="layout-section">NOW PLAYING BAR</aside>
</body>
</html>
